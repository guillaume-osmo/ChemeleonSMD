<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1140" viewBox="0 0 1600 1140" role="img" aria-labelledby="title desc">
  <title id="title">ChemeleonSMD Cached Pipeline</title>
  <desc id="desc">Diagram showing the cached MLX pipeline for teacher-to-student distillation, descriptor pretraining, and downstream finetuning.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="55%" stop-color="#eef7f4"/>
      <stop offset="100%" stop-color="#fff6eb"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0b4f6c"/>
      <stop offset="100%" stop-color="#118ab2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#17324d" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f6fed"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#178f87"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c47f00"/>
    </marker>
    <style>
      .title { font: 700 36px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #12344d; }
      .subtitle { font: 500 18px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #486581; }
      .section { font: 700 20px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #12344d; }
      .boxTitle { font: 700 20px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #12344d; }
      .boxText { font: 500 16px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #334e68; }
      .pill { font: 700 13px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #ffffff; letter-spacing: 0.4px; }
      .label { font: 700 13px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #0b4f6c; }
      .label2 { font: 700 13px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #166534; }
      .label3 { font: 700 13px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #8a5b00; }
      .credit { font: 600 15px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #486581; }
    </style>
  </defs>

  <rect width="1600" height="1140" fill="url(#bg)"/>
  <rect x="42" y="38" width="1516" height="1064" rx="34" fill="#ffffff" opacity="0.72"/>

  <text x="80" y="100" class="title">ChemeleonSMD: cached distillation, pretraining, and finetuning</text>
  <text x="80" y="132" class="subtitle">Chemistry runs once, caches land on disk, and MLX trains or finetunes from aligned arrays instead of re-featurizing every epoch.</text>

  <rect x="80" y="180" width="270" height="150" rx="26" fill="#edf4ff" stroke="#9dbcf7" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="240" class="boxTitle">1. Input molecules</text>
  <text x="110" y="272" class="boxText">SMILES from PubChem,</text>
  <text x="110" y="296" class="boxText">seed sets, eval pools,</text>
  <text x="110" y="320" class="boxText">or finetuning benchmarks</text>
  <rect x="232" y="194" width="94" height="24" rx="12" fill="url(#titleGrad)"/>
  <text x="279" y="210" text-anchor="middle" class="pill">SMILES</text>

  <rect x="420" y="180" width="320" height="150" rx="26" fill="#e9fbf6" stroke="#86d7c5" stroke-width="2" filter="url(#shadow)"/>
  <text x="452" y="240" class="boxTitle">2. Graph cache</text>
  <text x="452" y="272" class="boxText">`graph_cache.py` stores sharded</text>
  <text x="452" y="296" class="boxText">atom and bond tensors, edges,</text>
  <text x="452" y="320" class="boxText">batch maps, and valid SMILES order</text>
  <rect x="592" y="194" width="124" height="24" rx="12" fill="#178f87"/>
  <text x="654" y="210" text-anchor="middle" class="pill">GRAPH CACHE</text>

  <rect x="820" y="180" width="320" height="150" rx="26" fill="#fff5df" stroke="#f3c96a" stroke-width="2" filter="url(#shadow)"/>
  <text x="852" y="240" class="boxTitle">3. Sidecar feature caches</text>
  <text x="852" y="272" class="boxText">Osmordred features or teacher</text>
  <text x="852" y="296" class="boxText">fingerprints stay in aligned</text>
  <text x="852" y="320" class="boxText">`.npz` files next to the graph cache</text>
  <rect x="982" y="194" width="138" height="24" rx="12" fill="#c47f00"/>
  <text x="1051" y="210" text-anchor="middle" class="pill">FEATURE CACHE</text>

  <path d="M350 255 C380 255, 392 255, 420 255" fill="none" stroke="#2f6fed" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <path d="M740 255 C770 255, 790 255, 820 255" fill="none" stroke="#2f6fed" stroke-width="5" marker-end="url(#arrowBlue)"/>

  <text x="80" y="392" class="section">Distillation branch</text>

  <rect x="80" y="438" width="310" height="150" rx="26" fill="#f0f6ff" stroke="#a8c3f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="112" y="484" class="boxTitle">CheMeleon teacher</text>
  <text x="112" y="516" class="boxText">Load the original DMPNN and</text>
  <text x="112" y="540" class="boxText">emit teacher fingerprints from</text>
  <text x="112" y="564" class="boxText">cached graph batches</text>
  <rect x="214" y="450" width="150" height="24" rx="12" fill="url(#titleGrad)"/>
  <text x="289" y="467" text-anchor="middle" class="pill">CHEMELEON</text>

  <rect x="470" y="438" width="320" height="150" rx="26" fill="#fff7e5" stroke="#f0c56c" stroke-width="2" filter="url(#shadow)"/>
  <text x="502" y="484" class="boxTitle">`distill_score_dmpnn.py`</text>
  <text x="502" y="516" class="boxText">Base conversion step:</text>
  <text x="502" y="540" class="boxText">CheMeleon fingerprints -&gt; SCORE student</text>
  <text x="502" y="564" class="boxText">using cached teacher target files</text>
  <rect x="632" y="450" width="136" height="24" rx="12" fill="#c47f00"/>
  <text x="700" y="467" text-anchor="middle" class="pill">DISTILL 1</text>

  <rect x="870" y="438" width="300" height="150" rx="26" fill="#e9fbf6" stroke="#86d7c5" stroke-width="2" filter="url(#shadow)"/>
  <text x="902" y="484" class="boxTitle">`distill_v2.py`</text>
  <text x="902" y="516" class="boxText">Cached refinement on:</text>
  <text x="902" y="540" class="boxText">seed set + hardest OOD cases</text>
  <text x="902" y="564" class="boxText">from an evaluation pool</text>
  <rect x="1050" y="450" width="82" height="24" rx="12" fill="#178f87"/>
  <text x="1091" y="467" text-anchor="middle" class="pill">V2</text>

  <rect x="1230" y="438" width="290" height="150" rx="26" fill="#edf4ff" stroke="#9dbcf7" stroke-width="2" filter="url(#shadow)"/>
  <text x="1262" y="484" class="boxTitle">`distill_v3.py`</text>
  <text x="1262" y="516" class="boxText">Cached v3 refinement on:</text>
  <text x="1262" y="540" class="boxText">base set + scaffold-diverse</text>
  <text x="1262" y="564" class="boxText">hard molecules from a large pool</text>
  <rect x="1422" y="450" width="72" height="24" rx="12" fill="url(#titleGrad)"/>
  <text x="1458" y="467" text-anchor="middle" class="pill">V3</text>

  <path d="M390 513 C420 513, 440 513, 470 513" fill="none" stroke="#c47f00" stroke-width="5" marker-end="url(#arrowGold)"/>
  <path d="M790 513 C820 513, 840 513, 870 513" fill="none" stroke="#178f87" stroke-width="5" marker-end="url(#arrowTeal)"/>
  <path d="M1170 513 C1190 513, 1210 513, 1230 513" fill="none" stroke="#2f6fed" stroke-width="5" marker-end="url(#arrowBlue)"/>

  <text x="80" y="632" class="section">Descriptor pretraining branch</text>

  <rect x="120" y="682" width="360" height="170" rx="28" fill="#fff7e5" stroke="#f0c56c" stroke-width="2" filter="url(#shadow)"/>
  <text x="154" y="732" class="boxTitle">Descriptor targets</text>
  <text x="154" y="764" class="boxText">Osmordred / descriptor cache</text>
  <text x="154" y="788" class="boxText">or any aligned molecule-feature</text>
  <text x="154" y="812" class="boxText">sidecar arrays you compute offline</text>
  <rect x="300" y="696" width="154" height="24" rx="12" fill="#c47f00"/>
  <text x="377" y="713" text-anchor="middle" class="pill">DESCRIPTORS</text>

  <rect x="590" y="682" width="420" height="170" rx="28" fill="#e9fbf6" stroke="#86d7c5" stroke-width="2" filter="url(#shadow)"/>
  <text x="624" y="732" class="boxTitle">`pretrain_score.py`</text>
  <text x="624" y="764" class="boxText">Pretraining, not finetuning:</text>
  <text x="624" y="788" class="boxText">masked descriptor prediction from cached graphs</text>
  <text x="624" y="812" class="boxText">with descriptor arrays aligned by graph index</text>
  <rect x="842" y="696" width="144" height="24" rx="12" fill="#178f87"/>
  <text x="914" y="713" text-anchor="middle" class="pill">PRETRAIN</text>

  <rect x="1120" y="682" width="320" height="170" rx="28" fill="#f0f6ff" stroke="#a8c3f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="1154" y="732" class="boxTitle">SCORE weights</text>
  <text x="1154" y="764" class="boxText">Reusable checkpoints for inference,</text>
  <text x="1154" y="788" class="boxText">hard-mining refinement, descriptor</text>
  <text x="1154" y="812" class="boxText">pretraining, and later finetuning</text>
  <rect x="1310" y="696" width="112" height="24" rx="12" fill="url(#titleGrad)"/>
  <text x="1366" y="713" text-anchor="middle" class="pill">OUTPUT</text>

  <text x="1065" y="904" class="section">Downstream finetuning</text>

  <rect x="1065" y="930" width="430" height="150" rx="28" fill="#fff2ea" stroke="#f0bb92" stroke-width="2" filter="url(#shadow)"/>
  <text x="1099" y="980" class="boxTitle">`finetuning_demo.py`</text>
  <text x="1099" y="1012" class="boxText">Cached lipophilicity demo:</text>
  <text x="1099" y="1036" class="boxText">load SCORE weights, reuse graph shards,</text>
  <text x="1099" y="1060" class="boxText">and fit a regression head without re-featurizing</text>
  <rect x="1339" y="944" width="130" height="24" rx="12" fill="#c47f00"/>
  <text x="1404" y="961" text-anchor="middle" class="pill">FINETUNE DEMO</text>

  <path d="M480 767 C520 767, 550 767, 590 767" fill="none" stroke="#c47f00" stroke-width="5" marker-end="url(#arrowGold)"/>
  <path d="M1010 767 C1048 767, 1082 767, 1120 767" fill="none" stroke="#178f87" stroke-width="5" marker-end="url(#arrowTeal)"/>
  <path d="M1280 852 C1280 878, 1280 900, 1280 930" fill="none" stroke="#2f6fed" stroke-width="5" marker-end="url(#arrowBlue)"/>

  <path d="M580 330 C520 348, 360 362, 275 438" fill="none" stroke="#2f6fed" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrowBlue)"/>
  <path d="M580 330 C780 340, 1180 340, 1540 360 C1540 520, 1540 620, 800 682" fill="none" stroke="#178f87" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrowTeal)"/>
  <path d="M980 330 C940 348, 800 366, 640 438" fill="none" stroke="#c47f00" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrowGold)"/>
  <path d="M980 330 C760 320, 220 320, 60 360 C40 500, 90 610, 330 682" fill="none" stroke="#c47f00" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrowGold)"/>

  <text x="410" y="366" class="label">cached graphs feed teacher inference</text>
  <text x="1008" y="620" class="label2">cached graphs feed descriptor pretraining</text>
  <text x="998" y="372" class="label3">teacher fingerprints become reusable targets</text>
  <text x="132" y="606" class="label3">molecule features stay separate from graph shards</text>
  <text x="1510" y="1102" text-anchor="end" class="credit">SMD by Guillaume Godin</text>
</svg>
